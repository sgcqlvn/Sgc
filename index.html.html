<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SGC v2</title>
<style>
body{font-family:Arial;margin:0;background:#f3f4f6}
header{background:#1677ff;color:white;padding:16px;text-align:center}
.card{background:white;margin:12px;padding:15px;border-radius:12px}
input,button{width:100%;padding:12px;margin:6px 0}
button{background:#1677ff;color:white;border:0;border-radius:8px}
.page{display:none}.active{display:block}
nav{position:fixed;bottom:0;width:100%;display:flex;background:white}
nav button{background:white;color:#333}
</style>
</head>
<body>
<div id="login" class="page active">
<header>SGC</header>
<div class="card">
<input id="user" placeholder="Tài khoản">
<input id="pass" type="password" placeholder="Mật khẩu">
<button onclick="login()">Đăng nhập</button>
</div>
</div>

<div id="app" class="page">
<header>SGC Quản Lý</header>
<div id="khach" class="page active">
<div class="card">
<h3>Thêm khách</h3>
<input id="name" placeholder="Tên khách">
<input id="money" placeholder="Tiền vay">
<input id="daily" placeholder="Góp/ngày">
<button onclick="addCustomer()">Thêm khách</button>
</div>
<div class="card" id="list"></div>
</div>
<nav>
<button onclick="show('khach')">🏠 Khách</button>
<button>💰 Thu</button>
<button>📊 Thống kê</button>
<button>⚙️ Cài đặt</button>
</nav>
</div>

<script>
let customers=JSON.parse(localStorage.getItem('sgc')||'[]');
function login(){
document.getElementById('login').classList.remove('active');
document.getElementById('app').classList.add('active');
render();
}
function addCustomer(){
let name=document.getElementById('name').value;
if(!name)return alert('Nhập tên khách');
customers.push({name:name,money:document.getElementById('money').value,daily:document.getElementById('daily').value});
localStorage.setItem('sgc',JSON.stringify(customers));
render();
}
function render(){
let l=document.getElementById('list');
l.innerHTML=customers.map(c=>'<div class="card"><b>'+c.name+'</b><br>Nợ: '+c.money+'<br>Góp/ngày: '+c.daily+'</div>').join('');
}
function show(x){}
render();
</script>
</body>
</html>
