<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SGC FULL</title>

<link rel="stylesheet" href="style.css">

<style>
*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{
margin:0;
background:#edf5ed;
}



.app{
max-width:460px;
margin:auto;
min-height:100vh;
background:white;
padding:15px;
}



.header{
background:#1b5e20;
color:white;
padding:20px;
border-radius:22px;
text-align:center;
}



.card{
background:white;
padding:18px;
border-radius:20px;
margin-top:15px;
box-shadow:0 4px 15px rgba(0,0,0,.12);
}



input{
width:100%;
padding:14px;
margin:8px 0;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;
}



button{
width:100%;
padding:14px;
margin:6px 0;
border:0;
border-radius:15px;
background:#2e7d32;
color:white;
font-size:16px;
font-weight:bold;
}



button:active{
transform:scale(.97);
}



.userBar{
display:flex;
gap:8px;
align-items:center;
margin-top:15px;
}



.userBar span{
flex:1;
font-weight:bold;
}



#menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:15px;
}



#menu button:nth-child(1){
background:#1976d2;
}


#menu button:nth-child(2){
background:#00897b;
}


#menu button:nth-child(3){
background:#ef6c00;
}


#menu button:nth-child(4){
background:#6a1b9a;
}


#menu button:nth-child(5){
background:#455a64;
}




.customer{
padding:15px;
margin:10px 0;
border-radius:18px;
background:white;
box-shadow:0 3px 12px #ddd;
border-left:10px solid #d32f2f;
}



.customer.green{
border-left-color:#2e7d32;
}



.customer.yellow{
border-left-color:#fbc02d;
}



.history{
background:#f5f5f5;
padding:12px;
margin:8px 0;
border-radius:12px;
}



.tree{
padding:15px;
background:#e8f5e9;
border-radius:15px;
margin:10px 0;
}



.money{
font-size:18px;
font-weight:bold;
}



.red{
color:#d32f2f;
font-weight:bold;
}



.greenText{
color:#2e7d32;
font-weight:bold;
}



.yellowText{
color:#f9a825;
font-weight:bold;
}
</style>
</head>


<body>


<div class="app">


<header class="header">

<h1>🌳 SGC FULL</h1>

<p>Sổ quản lý dây</p>

</header>





<div id="loginBox" class="card">


<h2>🔐 Đăng nhập</h2>


<input id="username" placeholder="Tài khoản">


<input id="password" type="password" placeholder="Mật khẩu">


<button id="loginBtn">
Đăng nhập
</button>

<div id="welcomeUser"></div>
</div>






<div id="mainApp" style="display:none;">


<div class="userBar">

<span id="welcome"></span>

<button onclick="logout()">
🚪 Thoát
</button>

</div>





<div id="menu">


<button onclick="showCustomers()">
👥 Khách
</button>


<button onclick="showTrees()">
🌱 Cây con
</button>


<button onclick="showProfit()">
💰 Lời
</button>


<button onclick="showStatistics()">
📊 Thống kê
</button>


<button onclick="showSettings()">
⚙️ Cài đặt
</button>


</div>





<div id="content">

</div>



</div>





</div>



<script type="module" src="script.js"></script>


<script>
alert("JS mới đã chạy");// =====================================
// SGC FULL FINAL
// SCRIPT.JS - PHẦN 1/2
// =====================================


// ===== DỮ LIỆU =====

let accounts = JSON.parse(
    localStorage.getItem("sgc_accounts")
) || [
    {
        id: 1,
        name: "Pun",
        username: "Pun",
        password: "2207",
        role: "admin",
        locked: false
    }
];


let customers = JSON.parse(
    localStorage.getItem("sgc_customers")
) || [];


let currentAccount = null;



function saveData(){

    localStorage.setItem(
        "sgc_accounts",
        JSON.stringify(accounts)
    );


    localStorage.setItem(
        "sgc_customers",
        JSON.stringify(customers)
    );

}





// ===== ĐĂNG NHẬP =====


document.addEventListener(
"DOMContentLoaded",
function(){

    let btn = document.getElementById("loginBtn");

    if(btn){
        btn.onclick = login;
    }

});





function login(){


    let user =
    document.getElementById("username").value.trim();


    let pass =
    document.getElementById("password").value.trim();



    let acc = accounts.find(function(a){

        return a.username === user
        &&
        a.password === pass
        &&
        !a.locked;

    });



    if(!acc){

        alert("Sai tài khoản hoặc mật khẩu");

        return;

    }



    currentAccount = acc;



    document.getElementById("loginBox")
    .style.display="none";


    document.getElementById("mainApp")
    .style.display="block";


    document.getElementById("welcome")
    .innerHTML =
    "🌳 Xin chào " + acc.name;



    showCustomers();

}





function logout(){

    currentAccount=null;

    location.reload();

}






// ===== LỌC KHÁCH THEO CÂY =====


function getMyCustomers(){


    if(!currentAccount){

        return [];

    }


    if(currentAccount.role==="admin"){

        return customers;

    }


    return customers.filter(function(c){

        return c.owner === currentAccount.username;

    });

}







// ===== KHÁCH HÀNG =====


function showCustomers(){


document.getElementById("content").innerHTML = `

<div class="card">

<h2>👥 Khách hàng</h2>


<input id="searchCustomer"
placeholder="🔎 Tìm khách..."
oninput="renderCustomers()">



<button onclick="addCustomer()">
➕ Thêm khách
</button>


<div id="customerList"></div>


</div>

`;



renderCustomers();


}








function addCustomer(){


let name = prompt("Tên khách:");

if(!name) return;



let loan = Number(
prompt("Số tiền mượn:")
);



let daily = Number(
prompt("Tiền góp mỗi ngày:")
);



let date = prompt(
"Ngày mượn:",
new Date().toLocaleDateString("vi-VN")
);



customers.push({

id: Date.now(),

owner: currentAccount.username,

name:name,

loan:loan,

daily:daily,

borrowDate:date,

paid:0,

profit:0,

lastPayDate:"",

lastMergeDate:"",

history:[],

mergeHistory:[]

});



saveData();


renderCustomers();


}







function renderCustomers(){


let box =
document.getElementById("customerList");


if(!box) return;



let search =
(document.getElementById("searchCustomer")?.value || "")
.toLowerCase();



box.innerHTML="";



getMyCustomers()
.filter(function(c){

return c.name.toLowerCase()
.includes(search);

})
.forEach(function(c){



let status="🔴 Chưa đóng";

let color="";

let today =
new Date().toLocaleDateString("vi-VN");



if(c.paid >= c.loan){

status="🟡 Trả hết";

color="yellow";


}else if(c.lastPayDate===today){

status="🟢 Đã đóng";

color="green";

}



box.innerHTML += `

<div class="customer ${color}"
onclick="openCustomer(${c.id})">


<h3>👤 ${c.name}</h3>


<p>
💵 Mượn:
${c.loan.toLocaleString()} đ
</p>


<p>
💳 Đã đóng:
${c.paid.toLocaleString()} đ
</p>


<p>
📅 Ngày mượn:
${c.borrowDate}
</p>


<b>${status}</b>


</div>

`;



});


}// =====================================
// SGC FULL FINAL
// SCRIPT.JS - PHẦN 2/2
// =====================================



// ===== CHI TIẾT KHÁCH =====


window.openCustomer=function(id){


let c = customers.find(function(x){

return x.id===id;

});


let history="";


c.history.forEach(function(h){

history += `

<div class="history">

📅 ${h.date}

<br>

💵 ${h.money.toLocaleString()} đ

</div>

`;

});



document.getElementById("content").innerHTML = `

<div class="card">


<h2>👤 ${c.name}</h2>


<p>💵 Tiền mượn:
${c.loan.toLocaleString()} đ</p>


<p>💳 Đã đóng:
${c.paid.toLocaleString()} đ</p>


<p>📆 Đã đóng:
${c.history.length} ngày</p>


<p>📅 Ngày mượn:
${c.borrowDate}</p>


<p>
🔄 Ngày lên dây mới:
${c.lastMergeDate || "Chưa có"}
</p>


<p>
💰 Lời:
${c.profit.toLocaleString()} đ
</p>



<button onclick="collectMoney(${c.id})">
💵 Thu tiền
</button>



<button onclick="mergeMoney(${c.id})">
🔄 Dồn tiền
</button>



<button onclick="editCustomer(${c.id})">
✏️ Sửa
</button>



<button onclick="deleteCustomer(${c.id})">
🗑 Xóa
</button>



<h3>📒 Lịch sử đóng</h3>

${history || "Chưa có"}


</div>

`;

}





// ===== THU TIỀN =====



window.collectMoney=function(id){


let c=customers.find(function(x){

return x.id===id;

});



let money=Number(
prompt("Số tiền thu:")
);



if(!money)return;



let date =
new Date()
.toLocaleDateString("vi-VN");



c.paid += money;


c.lastPayDate=date;



c.history.push({

date:date,

money:money

});



saveData();


openCustomer(id);


}







// ===== DỒN TIỀN =====



window.mergeMoney=function(id){


let c=customers.find(function(x){

return x.id===id;

});



let total=Number(
prompt("Tổng tiền đã đóng:")
);



let keep=Number(
prompt("Tiền dồn:")
);



let profit=total-keep;



let date =
new Date()
.toLocaleDateString("vi-VN");



c.profit += profit;


c.lastMergeDate=date;



c.mergeHistory.push({

date:date,

total:total,

keep:keep,

profit:profit

});



saveData();



alert(
"Đã dồn. Lời: "
+
profit.toLocaleString()
+
" đ"
);



openCustomer(id);


}







// ===== SỬA KHÁCH =====


window.editCustomer=function(id){


let c=customers.find(function(x){

return x.id===id;

});



c.loan=Number(
prompt(
"Sửa tiền mượn:",
c.loan
)
);



c.daily=Number(
prompt(
"Sửa tiền góp/ngày:",
c.daily
)
);



saveData();


openCustomer(id);


}






window.deleteCustomer=function(id){


if(!confirm("Xóa khách?"))return;


customers =
customers.filter(function(c){

return c.id!==id;

});


saveData();


showCustomers();


}







// ===== CÂY CON =====


// =====================================
// 🌱 QUẢN LÝ CÂY CON NÂNG CAO
// =====================================


// =====================================
// 🌱 CÂY CON + PHÂN QUYỀN HOÀN CHỈNH
// =====================================



function showTrees(){


if(currentAccount.role!=="admin"){

document.getElementById("content").innerHTML=`

<div class="card">

<h2>🌱 Cây con</h2>

<p>Không có quyền quản lý cây con</p>

</div>

`;

return;

}



document.getElementById("content").innerHTML=`

<div class="card">

<h2>🌱 Quản lý cây con</h2>


<button onclick="addTree()">
➕ Tạo cây con
</button>


<div id="treeList"></div>


</div>

`;

renderTrees();

}








window.addTree=function(){


let name=prompt("Tên cây con:");

let username=prompt("Tài khoản:");

let password=prompt("Mật khẩu:");



if(!name || !username || !password)
return;



let permission={


add:
confirm("Cho phép thêm khách?"),


collect:
confirm("Cho phép thu tiền?"),


merge:
confirm("Cho phép dồn tiền?"),


edit:
confirm("Cho phép sửa khách?"),


delete:
confirm("Cho phép xóa khách?")


};




accounts.push({

id:Date.now(),

name:name,

username:username,

password:password,

role:"child",

locked:false,

permission:permission

});



saveData();


renderTrees();


alert("Đã tạo cây con");

}









function renderTrees(){



let box=document.getElementById("treeList");


if(!box)return;



box.innerHTML="";



accounts.forEach(function(a){



if(a.role==="child"){



let list =
customers.filter(function(c){

return c.owner===a.username;

});



let total=0;


let profit=0;



list.forEach(function(c){

total+=c.loan;

profit+=c.profit;

});




box.innerHTML += `


<div class="tree">


<h3>🌱 ${a.name}</h3>


<p>
👤 ${a.username}
</p>


<p>
${a.locked ? "🔒 Khóa":"🔓 Hoạt động"}
</p>


<p>
👥 Khách: ${list.length}
</p>


<p>
💵 Đang chạy:
${total.toLocaleString()} đ
</p>


<p>
💰 Lời:
${profit.toLocaleString()} đ
</p>



<button onclick="renameTree(${a.id})">
✏️ Đổi tên
</button>



<button onclick="changeTreePassword(${a.id})">
🔑 Đổi MK
</button>



<button onclick="editTreePermission(${a.id})">
⚙️ Quyền
</button>



<button onclick="toggleTree(${a.id})">
🔒 Khóa/Mở
</button>



<button onclick="deleteTree(${a.id})">
🗑 Xóa
</button>


</div>


`;

}


});


}








window.renameTree=function(id){


let tree=accounts.find(function(a){

return a.id===id;

});


let name=prompt(
"Tên mới:",
tree.name
);



if(!name)return;



tree.name=name;



saveData();


renderTrees();


}









window.changeTreePassword=function(id){


let tree=accounts.find(function(a){

return a.id===id;

});



let pass=prompt(
"Mật khẩu mới:"
);



if(!pass)return;



tree.password=pass;



saveData();


alert("Đã đổi mật khẩu");

}









window.editTreePermission=function(id){


let tree=accounts.find(function(a){

return a.id===id;

});



tree.permission={


add:
confirm("Cho phép thêm khách?"),


collect:
confirm("Cho phép thu tiền?"),


merge:
confirm("Cho phép dồn tiền?"),


edit:
confirm("Cho phép sửa khách?"),


delete:
confirm("Cho phép xóa khách?")


};



saveData();



alert("Đã cập nhật quyền");


}









window.toggleTree=function(id){


let tree=accounts.find(function(a){

return a.id===id;

});



tree.locked=!tree.locked;



saveData();


renderTrees();


}








window.deleteTree=function(id){


if(!confirm("Xóa cây con này?"))
return;



let tree=accounts.find(function(a){

return a.id===id;

});



accounts =
accounts.filter(function(a){

return a.id!==id;

});



customers =
customers.filter(function(c){

return c.owner!==tree.username;

});



saveData();


renderTrees();


}






// ===== KIỂM TRA QUYỀN =====


function hasPermission(type){



if(currentAccount.role==="admin")
return true;



return currentAccount.permission
&&
currentAccount.permission[type];

};window.testFirebaseLogin = function(){

    )

    })
    .catch(function(error){
        alert(error.message);
    });

};window.addCustomer = function(){

    alert("Chức năng thêm khách đang hoạt động");

};
</script>
