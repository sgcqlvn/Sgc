<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SGC Quản Lý</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<div id="loginBox" class="box">

<h1>SGC</h1>
<p>Sổ Quản Lý</p>


<input id="loginUser" placeholder="Tên tài khoản">

<input id="loginPass" type="password" placeholder="Mật khẩu">


<button onclick="login()">
Đăng nhập
</button>


<button onclick="createBook()">
Tạo sổ mới
</button>


</div>





<div id="app" class="hidden">


<header>

<h2 id="bookName">
SGC
</h2>


<button onclick="logout()">
Đăng xuất
</button>

</header>



<div class="menu">

<button onclick="showTab('customers')">
👥 Khách
</button>


<button onclick="showTab('stats')">
📊 Thống kê
</button>


<button onclick="showTab('settings')">
⚙️ Cài đặt
</button>

</div>







<section id="customers">


<h3>Khách hàng</h3>


<input 
id="searchBox"
placeholder="Tìm khách..."
oninput="searchCustomer()"
>


<button onclick="addCustomer()">
+ Thêm khách
</button>


<div id="customerList">

</div>


</section>







<section id="stats" class="hidden">


<h3>Thống kê</h3>


<p>
Tổng thu hôm nay:
<b id="todayIncome">0</b>
</p>


<p>
Tổng thu tháng:
<b id="monthIncome">0</b>
</p>


<p>
Tổng dồn hôm nay:
<b id="todayMerge">0</b>
</p>


<p>
Tổng dồn tháng:
<b id="monthMerge">0</b>
</p>


<p>
Tổng lời hôm nay:
<b id="todayProfit">0</b>
</p>


<p>
Tổng lời tháng:
<b id="monthProfit">0</b>
</p>


</section>







<section id="settings" class="hidden">


<h3>Cài đặt</h3>


<button onclick="changePassword()">
Đổi mật khẩu
</button>


<button onclick="backupData()">
Sao lưu dữ liệu
</button>


</section>



</div>




<script src="app.js"></script>

</body>
</html>
